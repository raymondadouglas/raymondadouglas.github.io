<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="icon" href="/favicon.ico">
    <style>
        ::selection {
            background: #f3dde3;
        }

        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0.5em;
            line-height: 1.6;
            color: #24292e;
        }

        .container {
            max-width: 46em;
            margin: 2em auto;
        }

        .card {
            background: #fff;
            padding: 1.5em 1.75em;
            border-radius: 0.5em;
            box-shadow: 0 2px 6px rgba(76, 31, 43, 0.06), 0 12px 32px rgba(76, 31, 43, 0.10);
            margin-bottom: 1.75em;
        }

        .card > h2:first-child {
            margin-top: 0;
        }

        h1 {
            font-variant: small-caps;
            font-weight: normal;
            margin: 0;
        }

        h2 {
            font-variant: small-caps;
            font-weight: normal;
            color: #8a3b52;
            border-bottom: 1px solid #e8d4da;
            padding-bottom: 0.15em;
            margin-top: 1.5em;
        }

        h3 {
            font-weight: normal;
            font-size: 0.78em;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: #8a3b52;
            border-bottom: 1px solid #e8d4da;
            padding-bottom: 0.4em;
            margin: 2.25em 0 1em;
        }

        img {
            width: 100%;
            border-radius: 0.5em;
        }

        ul li {
            margin-bottom: 0.5rem;
        }

        a {
            color: inherit;
            text-underline-offset: 2.5px;
            text-decoration: dotted underline #888;
            transition: cubic-bezier(1, 0, 0, 1);
            transition-duration: 0.2s;
        }

        a:hover {
            color: #8a3b52;
            text-decoration: dotted underline #8a3b52;
        }

        /* Header card: full-bleed photo beside centred name + emails */
        .headercard {
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }

        .profilepic {
            display: flex;
        }

        .profilepic img {
            display: block;
            width: 100%;
            height: 240px;
            object-fit: cover;
            object-position: center calc(50% + 20px);
            border-radius: 0;
        }

        .headertext {
            text-align: center;
            padding: 1.5em 1.25em;
        }

        .affiliation {
            display: grid;
            grid-template-columns: repeat(3, max-content);
            column-gap: 0.35em;
            width: max-content;
            margin: 0.6em auto 0;
            font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            font-size: 0.8em;
            line-height: 2;
            color: #8d7f83;
        }

        /* Names and domains hang off the aligned @ column */
        .affiliation > *:nth-child(3n+1) {
            justify-self: end;
        }

        .affiliation > *:nth-child(3n) {
            justify-self: start;
        }

        .affiliation .dom {
            color: #8a3b52;
        }

        /* External profiles: icon rail in the header card
           (mobile: row along the bottom; desktop: vertical rail on the left) */
        .social-icons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5em;
            padding: 1.2em 1.25em;
            border-top: 1px solid #f0e2e6;
            color: #8d7f83;
        }
        .social-icons a {
            display: block;
            color: inherit;
            text-decoration: none;
        }
        .social-icons a:hover {
            color: #8a3b52;
        }
        .social-icons svg {
            display: block;
            width: 1.1em;
            height: 1.1em;
            fill: currentColor;
        }

        @media (min-width: 570px) {
            .card {
                padding: 2em 2.5em;
            }
            .headercard {
                flex-direction: row-reverse;
                align-items: stretch;
                padding: 0;
            }
            .profilepic {
                flex: 0 1 260px;
                min-width: 0;
            }
            .profilepic img {
                height: 100%;
                min-height: 240px;
                min-width: 0;
                object-position: center;
            }
            .headertext {
                flex: 1;
                align-self: center;
                padding: 2em 1.5em;
            }
            /* Rail width = lower cards' 2.5em text inset, so the
               hairline sits exactly on the page's left text margin */
            .social-icons {
                flex-direction: column;
                justify-content: center;
                gap: 1.3em;
                flex: 0 0 2.5em;
                padding: 1.5em 0;
                border-top: none;
                border-right: 1px solid #f0e2e6;
            }
        }

    </style>
  </head>
  <body>
    {% include dots.html %}
    <div class="container">
        {{ content }}
    </div>
  </body>
</html>
