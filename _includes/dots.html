<canvas id="waveCanvas"></canvas>
    <style>
      #waveCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1; /* Ensures it stays behind your content */
        background-color: #fff4f4; /* Matches your current background */
      }
    </style>

<script>
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const variant = { colors: ['#8a3b52', '#b98a97', '#c9a3ae'], alpha: 0.45 };

  let stars = []; // Array to hold our stars
  const layers = 4; // Number of star layers, nearest first

  let lastScrollY = window.scrollY; // Track the last scroll position

  function createStars() {
    stars = [];
    const starsPerLayer = Math.round(canvas.width / 5); // Adjust the density of stars here
    for (let i = 1; i <= layers; i++) {
      let layerStars = [];
      for (let j = 0; j < starsPerLayer; j++) {
        const star = {
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: (0.6 + Math.random() * 1.6) / Math.sqrt(i), // Deeper layers are smaller
          color: variant.colors[Math.floor(Math.random() * variant.colors.length)],
          alpha: variant.alpha * (0.4 + 0.6 / i), // Deeper layers are fainter
          layer: i
        };
        layerStars.push(star);
      }
      stars.push(layerStars);
    }
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(layer => {
      layer.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, (star.y + canvas.height) % canvas.height, star.radius, 0, 2 * Math.PI);
        ctx.globalAlpha = star.alpha;
        ctx.fillStyle = star.color;
        ctx.fill();
      });
    });
    ctx.globalAlpha = 1;
  }

  function updateStarPositions() {
    const currentScrollY = window.scrollY;
    const scrollDifference = currentScrollY - lastScrollY;

    stars.forEach((layer, index) => {
      const layerSpeed = 1/(index+1); // Adjust the parallax speed here
      layer.forEach(star => {
        star.y -= scrollDifference * layerSpeed; // Move stars in opposite direction of scroll
      });
    });

    lastScrollY = currentScrollY; // Update last scroll position
    drawStars();
  }

  // Handle canvas resizing
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    createStars();
    drawStars();
  });

  // Update star positions on scroll
  window.addEventListener('scroll', updateStarPositions);

  createStars();
  drawStars();

</script>
